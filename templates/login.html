<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💎 AswinDate · Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #E4B95B;
            --dark: #1A1A2E;
            --soft-white: #F9F7F3;
            --gradient-primary: linear-gradient(145deg, #2D2A54 0%, #1A1A2E 100%);
            --gradient-accent: linear-gradient(135deg, #E4B95B, #D4A35A);
        }
        * { font-family: 'Inter', sans-serif; margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--gradient-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }
        body::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -30%;
            width: 80%;
            height: 80%;
            background: radial-gradient(circle, rgba(228,185,91,0.08) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
        }
        body::after {
            content: '';
            position: absolute;
            bottom: -40%;
            left: -20%;
            width: 60%;
            height: 60%;
            background: radial-gradient(circle, rgba(228,185,91,0.05) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
        }
        .login-container {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(12px);
            padding: 44px 40px 40px;
            border-radius: 32px;
            max-width: 420px;
            width: 100%;
            box-shadow: 0 30px 80px rgba(0,0,0,0.5);
            border: 1px solid rgba(228,185,91,0.15);
            position: relative;
            z-index: 2;
        }
        .logo {
            text-align: center;
            margin-bottom: 32px;
        }
        .logo-icon {
            font-size: 52px;
            color: var(--gold);
            background: rgba(228,185,91,0.1);
            width: 80px;
            height: 80px;
            line-height: 80px;
            border-radius: 50%;
            margin: 0 auto 16px;
            border: 2px solid rgba(228,185,91,0.2);
        }
        .logo h2 {
            font-family: 'Playfair Display', serif;
            font-size: 32px;
            background: var(--gradient-accent);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.5px;
        }
        .logo p {
            color: #6B6B7B;
            font-weight: 400;
            font-size: 15px;
            margin-top: 4px;
        }
        .form-control {
            border-radius: 16px;
            padding: 14px 18px;
            border: 2px solid #EEEEF0;
            background: #FAFAFC;
            font-weight: 500;
            transition: all 0.25s;
        }
        .form-control:focus {
            border-color: var(--gold);
            box-shadow: 0 0 0 4px rgba(228,185,91,0.15);
            background: white;
        }
        .btn-premium {
            background: var(--gradient-accent);
            border: none;
            border-radius: 60px;
            padding: 14px;
            font-weight: 800;
            width: 100%;
            color: var(--dark);
            transition: all 0.25s;
            box-shadow: 0 4px 16px rgba(228,185,91,0.3);
            font-size: 16px;
            letter-spacing: 0.3px;
        }
        .btn-premium:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 32px rgba(228,185,91,0.4);
        }
        .register-link {
            text-align: center;
            margin-top: 20px;
            color: #6B6B7B;
            font-weight: 500;
        }
        .register-link a {
            color: var(--gold);
            text-decoration: none;
            font-weight: 700;
            border-bottom: 2px solid transparent;
            transition: 0.2s;
        }
        .register-link a:hover {
            border-bottom-color: var(--gold);
        }
        .alert-premium {
            border-radius: 16px;
            border: none;
            background: rgba(231, 76, 60, 0.08);
            color: #C0392B;
            padding: 14px 18px;
            font-weight: 600;
            border-left: 4px solid #E74C3C;
        }
        .input-group-text {
            background: transparent;
            border: none;
            color: #6B6B7B;
            padding-right: 0;
        }
        .input-group .form-control {
            border-left: none;
            padding-left: 4px;
        }
        .input-group {
            border: 2px solid #EEEEF0;
            border-radius: 16px;
            background: #FAFAFC;
            transition: all 0.25s;
        }
        .input-group:focus-within {
            border-color: var(--gold);
            box-shadow: 0 0 0 4px rgba(228,185,91,0.1);
            background: white;
        }
        .input-group .form-control {
            border: none;
            background: transparent;
            box-shadow: none !important;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <div class="logo-icon">💎</div>
            <h2>AswinDate</h2>
            <p>Find your perfect match ✨</p>
        </div>

        {% if error %}<div class="alert alert-premium">{{ error }}</div>{% endif %}

        <form method="POST" action="{{ url_for('login') }}">
            <div class="mb-3">
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-user" style="color: var(--gold);"></i></span>
                    <input type="text" name="username" class="form-control" placeholder="Username" required>
                </div>
            </div>
            <div class="mb-4">
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-lock" style="color: var(--gold);"></i></span>
                    <input type="password" name="password" class="form-control" placeholder="Password" required>
                </div>
            </div>
            <button type="submit" class="btn-premium"><i class="fas fa-heart me-2"></i>Login</button>
        </form>

        <div class="register-link">
            New here? <a href="{{ url_for('register') }}">Create Account</a>
        </div>
    </div>
</body>
</html>
