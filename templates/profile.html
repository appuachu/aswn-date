<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💎 AswinDate · Profile</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #E4B95B;
            --dark: #1A1A2E;
            --soft-white: #F9F7F3;
            --gradient-primary: linear-gradient(145deg, #2D2A54 0%, #1A1A2E 100%);
            --gradient-accent: linear-gradient(135deg, #E4B95B, #D4A35A);
        }
        * { font-family: 'Inter', sans-serif; margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--soft-white);
            min-height: 100vh;
            background-image: radial-gradient(circle at 20% 30%, rgba(228,185,91,0.04) 0%, transparent 40%);
        }
        .profile-header {
            background: var(--gradient-primary);
            padding: 36px 0 28px;
            margin-bottom: 28px;
            position: relative;
            overflow: hidden;
        }
        .profile-header::after {
            content: '';
            position: absolute;
            top: -60%;
            right: -10%;
            width: 40%;
            height: 200%;
            background: radial-gradient(circle, rgba(228,185,91,0.06) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
        }
        .profile-header h4 {
            color: white;
            font-weight: 800;
            letter-spacing: -0.3px;
            position: relative;
            z-index: 2;
        }
        .profile-header h4 i { color: var(--gold); margin-right: 10px; }
        .profile-card {
            background: white;
            border-radius: 28px;
            padding: 32px 28px 28px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.06);
            border: 1px solid rgba(228,185,91,0.1);
        }
        .avatar-big-premium {
            width: 96px;
            height: 96px;
            border-radius: 50%;
            background: var(--gradient-accent);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--dark);
            font-size: 38px;
            font-weight: 800;
            margin: 0 auto 14px;
            border: 4px solid white;
            box-shadow: 0 8px 24px rgba(228,185,91,0.25);
        }
        .form-control-premium {
            border-radius: 16px;
            padding: 12px 18px;
            border: 2px solid #EEEEF0;
            background: #FAFAFC;
            font-weight: 500;
            transition: all 0.25s;
        }
        .form-control-premium:focus {
            border-color: var(--gold);
            box-shadow: 0 0 0 4px rgba(228,185,91,0.12);
            background: white;
        }
        .form-label {
            font-weight: 700;
            color: var(--dark);
            font-size: 14px;
            letter-spacing: 0.2px;
        }
        .btn-save-premium {
            background: var(--gradient-accent);
            border: none;
            border-radius: 60px;
            padding: 14px;
            font-weight: 800;
            width: 100%;
            color: var(--dark);
            transition: all 0.25s;
            box-shadow: 0 4px 16px rgba(228,185,91,0.25);
            font-size: 16px;
        }
        .btn-save-premium:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 32px rgba(228,185,91,0.35);
        }
        .btn-outline-premium {
            border: 2px solid #E0E0E8;
            border-radius: 60px;
            padding: 10px 24px;
            color: #6B6B7B;
            font-weight: 700;
            transition: all 0.2s;
            background: transparent;
        }
        .btn-outline-premium:hover {
            border-color: var(--gold);
            color: var(--dark);
            background: rgba(228,185,91,0.04);
        }
        .gold-text { color: var(--gold); }
    </style>
</head>
<body>
    <div class="profile-header">
        <div class="container">
            <h4><i class="fas fa-id-card"></i> My Profile</h4>
        </div>
    </div>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-7">
                <div class="profile-card">
                    <div class="text-center">
                        <div class="avatar-big-premium">{{ user.username[0].upper() }}</div>
                        <h5 class="fw-bold" style="color: var(--dark);">{{ user.username }}</h5>
                        <p class="text-muted"><i class="fas fa-coins gold-text me-1"></i> {{ user.coins }} coins</p>
                    </div>

                    <form method="POST" action="{{ url_for('update_profile') }}">
                        <div class="mb-3">
                            <label class="form-label">Age</label>
                            <input type="number" name="age" class="form-control form-control-premium" value="{{ profile.age if profile else '' }}" placeholder="Your age">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Location</label>
                            <input type="text" name="location" class="form-control form-control-premium" value="{{ profile.location if profile else '' }}" placeholder="City, Country">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Bio</label>
                            <textarea name="bio" class="form-control form-control-premium" rows="3" placeholder="Tell us about yourself...">{{ profile.bio if profile else '' }}</textarea>
                        </div>
                        <div class="mb-4">
                            <label class="form-label">Interests</label>
                            <input type="text" name="interests" class="form-control form-control-premium" value="{{ profile.interests if profile else '' }}" placeholder="Music, Travel, Sports">
                        </div>
                        <button type="submit" class="btn-save-premium"><i class="fas fa-save me-2"></i>Save Profile</button>
                    </form>

                    <div class="mt-4 text-center">
                        <a href="{{ url_for('home') }}" class="btn-outline-premium"><i class="fas fa-arrow-left me-2"></i>Back</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
